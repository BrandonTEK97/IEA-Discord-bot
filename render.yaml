services:
  - type: web
    name: ige-discord-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: AGENT_ID
        sync: false
      - key: ENVIRONMENT_ID
        value: academy-admin-env
